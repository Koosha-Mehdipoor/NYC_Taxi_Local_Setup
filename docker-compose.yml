services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: koosha
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: NYC_Taxi
    ports:
      - 5432:5432
    volumes:
      - "postgres_data:/var/lib/postgresql/data"

  pgadmin:
    image: dpage/pgadmin4:9.8
    ports:
      - 5050:80
    environment:
      # Required by pgAdmin
      PGADMIN_DEFAULT_EMAIL: koosha@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    volumes:
      - "pgadmin_data:/var/lib/pgadmin"
volumes:
  postgres_data:
  pgadmin_data: